<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Frontend</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="/assets/css/styles.css" />
    </head>
    <body>
        <main class="app-shell">
            <section class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-5">
                                <span class="badge text-bg-dark mb-3">Frontend</span>
                                <h1 class="display-6 mb-3">Ambiente separado com Bootstrap e JavaScript</h1>
                                <p class="lead text-secondary mb-4">
                                    Esta estrutura foi preparada para consumir a API Laravel de forma
                                    independente.
                                </p>

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <div class="panel h-100">
                                            <h2 class="h5">Frontend</h2>
                                            <p class="mb-0">
                                                Disponivel em
                                                <code>http://localhost:8090</code>
                                            </p>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="panel h-100">
                                            <h2 class="h5">API</h2>
                                            <p class="mb-0">
                                                Disponivel em
                                                <code>http://localhost:8080</code>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script src="/assets/js/app.js"></script>
    </body>
</html>
